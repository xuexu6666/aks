# Path B — cross-node IB / RDMA: 2 nodes x 1 GPU, DEVICE-PLUGIN model.
# Each worker requests nvidia.com/gpu:1 (GPU+libs via nvidia runtime) AND
# rdma/shared_ib:1 (all 4 IB NICs via the RDMA shared plugin, shared mode).
# No privileged, no hostNetwork (AKS shared RDMA-netns). GDR via inbox dmabuf.
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-ib
  namespace: __NAMESPACE__
spec:
  slotsPerWorker: 1
  runPolicy: {cleanPodPolicy: Running}
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
          containers:
          - name: launcher
            image: __NCCL_IMAGE__
            command: ["/bin/bash","-lc"]
            args:
            - |
              sleep 20
              mpirun -np 2 --allow-run-as-root -bind-to none \
                -x LD_LIBRARY_PATH -x PATH \
                -x NCCL_DEBUG=INFO -x NCCL_DEBUG_SUBSYS=INIT,NET \
                -x NCCL_IB_DISABLE=0 -x NCCL_IB_HCA=mlx5 \
                -x NCCL_NET_GDR_LEVEL=SYS \
                -x NCCL_MNNVL_ENABLE=0 -x NCCL_NVLS_ENABLE=0 -x NCCL_SHM_DISABLE=1 \
                -x NCCL_SOCKET_IFNAME=eth0 \
                /opt/nccl_tests/build/all_reduce_perf -b 512M -e 4G -f 2 -g 1
    Worker:
      replicas: 2
      template:
        spec:
          runtimeClassName: nvidia
          tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector: {matchLabels: {training.kubeflow.org/job-name: nccl-ib}}
                topologyKey: kubernetes.io/hostname
          containers:
          - name: worker
            image: __NCCL_IMAGE__
            resources:
              limits:
                nvidia.com/gpu: "1"
                rdma/shared_ib: "1"

# Installs the nvidia container-toolkit BINARIES + runtime config to
# /usr/local/nvidia/toolkit on each GB node, WITHOUT touching AKS's
# /etc/containerd/config.toml (03-nvidia-runtime.sh wires containerd additively).
#
# How: run the operator's own installer (/work/nvidia-ctk-installer) with
#   --restart-mode none  (don't restart containerd)
# and DO NOT mount the host /etc/containerd — so the installer's drop-in write
# stays inside the pod and the host containerd config is left intact. It still
# drops the binaries + the runtime config (mode=legacy, driverRoot=/run/nvidia/driver)
# onto the host via the /usr/local/nvidia mount.
apiVersion: apps/v1
kind: DaemonSet
metadata: {name: nvidia-toolkit-install, namespace: nvidia}
spec:
  selector: {matchLabels: {app: nvidia-toolkit-install}}
  template:
    metadata: {labels: {app: nvidia-toolkit-install}}
    spec:
      nodeSelector: {agentpool: gb300}
      tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
      containers:
      - name: install
        image: __TOOLKIT_IMAGE__
        securityContext: {privileged: true}
        command: ["/bin/sh","-c"]
        args:
        - |
          set -e
          /work/nvidia-ctk-installer --no-daemon --runtime containerd \
            --toolkit-install-dir /usr/local/nvidia \
            --nvidia-driver-root __DRIVER_ROOT__ \
            --nvidia-container-runtime.mode legacy \
            --restart-mode none \
            --config /tmp/ignore-containerd.toml \
            --config-source file
          test -x /usr/local/nvidia/toolkit/nvidia-container-runtime && echo "TOOLKIT_INSTALL_OK"
          while true; do sleep 3600; done
        volumeMounts:
        - {name: nvidia, mountPath: /usr/local/nvidia}
      volumes:
      # host /usr/local/nvidia — binaries land here at .../toolkit (must match the
      # host path so the generated wrapper scripts reference the right location).
      - {name: nvidia, hostPath: {path: /usr/local/nvidia, type: DirectoryOrCreate}}

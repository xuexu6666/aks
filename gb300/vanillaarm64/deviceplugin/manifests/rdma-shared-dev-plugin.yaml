# RDMA shared device plugin — exposes the IB NICs as a schedulable resource
# (rdma/shared_ib) so pods get /dev/infiniband WITHOUT privileged/hostNetwork
# (AKS runs shared RDMA-netns mode). Needed for cross-node IB (Path B) under the
# device-plugin model.
#
# SHARED semantics: rdmaHcaMax is the number of PODS that may request the
# resource; each such pod is granted ALL matched HCAs (all 4 CX-8 NICs), not a
# dedicated NIC. For per-NIC isolation use SR-IOV or DRA/dranet instead.
#
# GB300 NICs are IB-only VFs with no netdev, so we select by vendor + linkType
# (NOT ifNames).
apiVersion: v1
kind: ConfigMap
metadata: {name: rdma-devices, namespace: nvidia}
data:
  config.json: |
    {
      "periodicUpdateInterval": 300,
      "configList": [
        {
          "resourceName": "shared_ib",
          "rdmaHcaMax": 63,
          "selectors": { "vendors": ["15b3"], "linkTypes": ["infiniband"] }
        }
      ]
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata: {name: rdma-shared-dp, namespace: nvidia}
spec:
  selector: {matchLabels: {app: rdma-shared-dp}}
  template:
    metadata: {labels: {app: rdma-shared-dp}}
    spec:
      priorityClassName: system-node-critical
      nodeSelector: {agentpool: gb300}
      tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
      containers:
      - name: rdma-shared-dp
        image: ghcr.io/mellanox/k8s-rdma-shared-dev-plugin:latest
        securityContext: {privileged: true}
        volumeMounts:
        - {name: devplugin, mountPath: /var/lib/kubelet/device-plugins}
        - {name: config, mountPath: /k8s-rdma-shared-dev-plugin}
        - {name: infiniband, mountPath: /dev/infiniband}
      volumes:
      - {name: devplugin, hostPath: {path: /var/lib/kubelet/device-plugins}}
      - {name: config, configMap: {name: rdma-devices}}
      - {name: infiniband, hostPath: {path: /dev/infiniband}}

# Path C — cross-node NVLink (MNNVL): 2 nodes x 1 GPU, DEVICE-PLUGIN model.
# GPU via nvidia.com/gpu (nvidia runtime). Cross-node NVLink needs IMEX (run
# 05-imex.sh first) + the IMEX channel device in the pod — the GPU device plugin
# does not expose it, so we mount /dev/nvidia-caps-imex-channels via hostPath.
# IB is disabled; transport is NVLS/MNNVL over the switch fabric.
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-mnnvl
  namespace: __NAMESPACE__
spec:
  slotsPerWorker: 1
  runPolicy: {cleanPodPolicy: Running}
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
          containers:
          - name: launcher
            image: __NCCL_IMAGE__
            command: ["/bin/bash","-lc"]
            args:
            - |
              sleep 20
              mpirun -np 2 --allow-run-as-root -bind-to none \
                -x LD_LIBRARY_PATH -x PATH \
                -x NCCL_DEBUG=INFO -x NCCL_DEBUG_SUBSYS=INIT,NVLS,GRAPH \
                -x NCCL_IB_DISABLE=1 \
                -x NCCL_NVLS_ENABLE=1 \
                -x NCCL_MNNVL_ENABLE=1 \
                -x NCCL_SOCKET_IFNAME=eth0 \
                /opt/nccl_tests/build/all_reduce_perf -b 512M -e 4G -f 2 -g 1
    Worker:
      replicas: 2
      template:
        spec:
          runtimeClassName: nvidia
          tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector: {matchLabels: {training.kubeflow.org/job-name: nccl-mnnvl}}
                topologyKey: kubernetes.io/hostname
          containers:
          - name: worker
            image: __NCCL_IMAGE__
            resources:
              limits:
                nvidia.com/gpu: "1"
            volumeMounts:
            - {name: imex, mountPath: /dev/nvidia-caps-imex-channels}
          volumes:
          - {name: imex, hostPath: {path: /dev/nvidia-caps-imex-channels}}

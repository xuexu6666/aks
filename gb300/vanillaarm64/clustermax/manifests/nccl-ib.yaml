# Path B — cross-node IB / RDMA: 2 nodes x 1 GPU.
# GPU comes via the DEVICE PLUGIN (runtimeClassName nvidia + nvidia.com/gpu).
# IB comes via a direct /dev/infiniband mount (privileged) — AKS shared RDMA-netns
# mode gives verbs access without hostNetwork. NCCL uses the inbox uverbs devices;
# GDR via inbox dmabuf. (The k8s-rdma-shared-dev-plugin is NOT used here: GB300 IB
# VFs expose no umad device, so it can't advertise the resource — see README.)
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-ib
  namespace: __NAMESPACE__
spec:
  slotsPerWorker: 1
  runPolicy: {cleanPodPolicy: Running}
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
          containers:
          - name: launcher
            image: __NCCL_IMAGE__
            command: ["/bin/bash","-lc"]
            args:
            - |
              sleep 20
              mpirun -np 2 --allow-run-as-root -bind-to none \
                -x LD_LIBRARY_PATH -x PATH \
                -x NCCL_DEBUG=INFO -x NCCL_DEBUG_SUBSYS=INIT,NET \
                -x NCCL_IB_DISABLE=0 -x NCCL_IB_HCA=mlx5 \
                -x NCCL_NET_GDR_LEVEL=SYS \
                -x NCCL_MNNVL_ENABLE=0 -x NCCL_NVLS_ENABLE=0 -x NCCL_SHM_DISABLE=1 \
                -x NCCL_SOCKET_IFNAME=eth0 \
                /opt/nccl_tests/build/all_reduce_perf -b 512M -e 4G -f 2 -g 1
    Worker:
      replicas: 2
      template:
        spec:
          runtimeClassName: nvidia
          tolerations: [{key: sku, value: gpu, operator: Equal, effect: NoSchedule}]
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector: {matchLabels: {training.kubeflow.org/job-name: nccl-ib}}
                topologyKey: kubernetes.io/hostname
          resourceClaims:
          - {name: gpu, resourceClaimTemplateName: gpu-1}   # GPU via DRA (device plugin is OFF)
          containers:
          - name: worker
            image: __NCCL_IMAGE__
            securityContext: {privileged: true}             # host-mounts ALL /dev/infiniband (4 NICs)
            resources:
              claims:
              - {name: gpu}
            volumeMounts:
            - {name: infiniband, mountPath: /dev/infiniband}
          volumes:
          - {name: infiniband, hostPath: {path: /dev/infiniband}}

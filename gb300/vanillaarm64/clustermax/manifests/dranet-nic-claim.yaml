# One IB NIC per pod, selected by dranet's `rdma` attribute so we get an RDMA
# device — not eth0. On GB300 the IB VFs are RDMA-only (no netdev); official
# dranet >= v1.3.0 still enumerates them via the PCI fallback and injects their
# /dev/infiniband char devices into the pod (Anson's upstreamed IB-only support,
# kubernetes-sigs/dranet PR #77). No pciAddress pin here — any RDMA NIC on the
# node works for a 1-GPU-per-node NCCL run.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: ib-nic
  namespace: __NAMESPACE__
spec:
  spec:
    devices:
      requests:
      - name: nic
        exactly:
          deviceClassName: dranet.net
          count: 1
          selectors:
          - cel:
              expression: 'device.attributes["dra.net"].rdma == true'

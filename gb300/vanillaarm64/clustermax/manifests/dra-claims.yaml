# GPU + IB-NIC DRA claim templates (device plugin OFF — DRA owns GPUs).
#
# Claiming the GPU (gpu.nvidia.com) and its IB NIC (dra.net) in ONE request keeps them
# together → GDR → ~56 GB/s/NIC (vs ~25 GB/s when they land apart). "aligned" pairs on
# GB300: gpu-0+mlx5_0 / gpu-1+mlx5_1 / gpu-2+mlx5_2 / gpu-3+mlx5_3. Selectors follow the
# upstream GB300 example (kubernetes-sigs/dranet examples/azure_aks_examples/gb300).
---
# Path A (intra-node NVLink): 4 GPUs, no NIC.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata: {name: gpus-4, namespace: __NAMESPACE__}
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly: {deviceClassName: gpu.nvidia.com, count: 4}
---
# ib-dra (cross-node IB): 1 GPU + its NUMA-aligned IB NIC — gpu-0 (0008:06:00.0, NUMA0)
# paired with mlx5_0 (NUMA0). One claim, so the scheduler co-locates them on NUMA 0.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata: {name: gpu-nic-aligned, namespace: __NAMESPACE__}
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
          count: 1
          selectors:
          - cel: {expression: 'device.attributes["resource.kubernetes.io"].pciBusID == "0008:06:00.0"'}
      - name: nic
        exactly:
          deviceClassName: dranet.net
          count: 1
          selectors:
          - cel: {expression: 'device.attributes["dra.net"]["rdmaDevice"] == "mlx5_0"'}
---
# mnnvl (cross-node NVLink): 1 GPU only — the IMEX channel is a separate ComputeDomain claim.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata: {name: gpu-1, namespace: __NAMESPACE__}
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly: {deviceClassName: gpu.nvidia.com, count: 1}
---
# ib-4nic (max IB): 4 GPUs + all 4 NUMA-aligned RDMA NICs in ONE claim → aggregate IB
# bandwidth (~364 GB/s validated) instead of the 1-NIC ~56. Uses the upstream NUMA/rdma
# selector (dra.net/rdma==true) rather than hardcoded mlx5 names, so DRA picks all 4 VFs.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata: {name: gpu4-nic4-aligned, namespace: __NAMESPACE__}
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly: {deviceClassName: gpu.nvidia.com, count: 4}
      - name: nic
        exactly:
          deviceClassName: dranet.net
          count: 4
          selectors:
          - cel: {expression: 'device.attributes["dra.net"]["rdma"] == true'}

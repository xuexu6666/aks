# Path B (DRA) — cross-node IB / RDMA via OFFICIAL dranet, NON-privileged.
#
# This is the CX-usable IB path. Unlike nccl-ib.yaml (privileged + hostPath
# /dev/infiniband), the worker here is NOT privileged and mounts nothing by hand.
# GPU + its IB NIC come from ONE DRA claim (gpu-nic-aligned: gpu-0 + mlx5_0), so they
# land together → GDR → ~56 GB/s/NIC (vs ~25 GB/s picked apart). dranet injects the VF's
# /dev/infiniband char devices into the pod. The only elevated bit is IPC_LOCK
# (RDMA memory registration) — a namespaced capability, not full privilege. Copy as-is.
#
# Launcher MUST run on a NON-GPU (system) node: dranet's NRI hook on the GB nodes
# disturbs OpenMPI's OOB callback, so a launcher co-located on a GB node fails
# ("ORTE ... no route"). Workers stay on GB nodes. (Same constraint as ../dra.)
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata: {name: nccl-ib-dra, namespace: __NAMESPACE__}
spec:
  slotsPerWorker: 1
  runPolicy: {cleanPodPolicy: Running}
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          nodeSelector: {agentpool: __LAUNCHER_POOL__}   # launcher off the GB nodes (see note)
          containers:
          - name: nccl
            image: __NCCL_IMAGE__
            command: ["/bin/bash","-c"]
            args:
            - |
              sleep 20
              # NCCL env matches the upstream GB300 example (kubernetes-sigs/dranet
              # examples/azure_aks_examples/gb300): Data-Direct OFF, GDR level PHB.
              # One NIC comes from the DRA claim, so no NCCL_IB_HCA pin is needed.
              mpirun -np 2 --allow-run-as-root -bind-to none \
                -x LD_LIBRARY_PATH \
                -x NCCL_DEBUG=INFO \
                -x NCCL_SOCKET_IFNAME=eth0 -x NCCL_IB_DISABLE=0 \
                -x NCCL_SHM_DISABLE=1 -x NCCL_MNNVL_ENABLE=0 -x NCCL_NVLS_ENABLE=0 \
                -x NCCL_NET_GDR_LEVEL=PHB -x NCCL_IB_DATA_DIRECT=0 \
                /opt/nccl_tests/build/all_reduce_perf -b 512M -e 8G -f 2 -g 1 -c 0
    Worker:
      replicas: 2
      template:
        spec:
          runtimeClassName: nvidia
          tolerations:
          - {key: sku, value: gpu, operator: Equal, effect: NoSchedule}
          - {key: nvidia.com/gpu, operator: Exists, effect: NoSchedule}
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector: {matchLabels: {training.kubeflow.org/job-name: nccl-ib-dra, training.kubeflow.org/job-role: worker}}
                topologyKey: kubernetes.io/hostname
          automountServiceAccountToken: false
          resourceClaims:
          - {name: gpu-nic, resourceClaimTemplateName: gpu-nic-aligned}
          containers:
          - name: nccl
            image: __NCCL_IMAGE__
            securityContext:
              capabilities: {add: ["IPC_LOCK"]}   # RDMA mem-registration; NOT privileged
              # IPC_LOCK is all this needs. With the GPU+NIC claimed NUMA-aligned
              # (gpu-nic-aligned), NCCL uses GPUDirect RDMA -> ~56 GB/s/NIC. An
              # *unaligned* pairing (or the old device-plugin split) drops to ~25 GB/s.
              # NB: NCCL_IB_DATA_DIRECT=0 is REQUIRED for this 1-NIC (-g1) path — with
              # Data-Direct on it collapses to ~0.44 GB/s (reconfirmed 2026-07-21, and it's
              # NOT a memlock issue: stock 8 MB vs unlimited made no difference). This is
              # specific to the single-NIC config; the 4-NIC path (nccl-ib-4nic.yaml) DOES
              # use Data-Direct on for ~378 GB/s. See README "Non-privileged IB".
            resources:
              claims:
              - {name: gpu-nic}                    # GPU + aligned IB NIC via DRA (one claim)

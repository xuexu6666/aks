# NVIDIA DRA driver values — GPUs + ComputeDomains (device plugin is DISABLED).
#
# The DRA driver OWNS GPU allocation here (publishes gpu.nvidia.com ResourceSlices),
# so a workload can claim a GPU and its NUMA-aligned IB NIC (dranet) in ONE claim —
# the scheduler places them on the same NUMA node, which unlocks GPUDirect RDMA and
# full IB bandwidth (~56 GB/s/NIC aligned vs ~25 GB/s cross-NUMA). ComputeDomains stays
# on for MNNVL IMEX channels.
#
#   resources.gpus.enabled: true          -> publish GPU ResourceSlices (DRA owns GPUs).
#   gpuResourcesEnabledOverride: true     -> REQUIRED to allow gpus.enabled=true; the chart's
#                                            validation.yaml otherwise hard-errors to prevent
#                                            double-allocation with the device plugin. Safe here
#                                            because the device plugin is OFF (values-gpu-operator.yaml).
#   resources.computeDomains.enabled: true -> keep the ComputeDomain / IMEX channel path (MNNVL).
gpuResourcesEnabledOverride: true
nvidiaDriverRoot: "/run/nvidia/driver"
resources:
  gpus:
    enabled: true
  computeDomains:
    enabled: true
kubeletPlugin:
  tolerations:
  - {key: sku, value: gpu, operator: Equal, effect: NoSchedule}
  - {key: nvidia.com/gpu, operator: Exists, effect: NoSchedule}
  - {key: CriticalAddonsOnly, operator: Exists}
controller:
  tolerations:
  - {key: sku, value: gpu, operator: Equal, effect: NoSchedule}
  - {key: nvidia.com/gpu, operator: Exists, effect: NoSchedule}
  - {key: CriticalAddonsOnly, operator: Exists}

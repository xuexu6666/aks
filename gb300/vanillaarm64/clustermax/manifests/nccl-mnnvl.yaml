# Path C — cross-node NVLink (MNNVL) with the DEVICE PLUGIN + DRA ComputeDomains.
#
# GPUs come from the device plugin (runtimeClassName nvidia + nvidia.com/gpu), and
# DRA ComputeDomains provides the IMEX channel automatically (no manual
# /etc/nvidia-imex). So each worker gets: nvidia.com/gpu:1 (device plugin) + the
# nccl-cd-channel resource claim (DRA). IB is disabled -> NVLink/NVLS transport.
#
# Requires: DRA driver with computeDomains.enabled=true (step 3) and its controller
# scheduled onto a system node. Launcher pinned to a NON-GPU node.
#
# PRIVILEGE: privileged is what works today (~593 GB/s). NVIDIA's ComputeDomains
# *intent* is non-privileged MNNVL (the DRA driver injects the IMEX channel); CoreWeave's
# GB200 example runs privileged:false with NO added caps (IPC_LOCK is an IB/RDMA thing,
# not a documented IMEX requirement). But no bandwidth-verified non-priv MNNVL run is
# published anywhere. On GB300 the IMEX channel DID inject non-priv
# (/dev/nvidia-caps-imex-channels/channel0), yet the collective crashed with IPC_LOCK,
# IPC_LOCK+SYS_ADMIN, and NCCL_NVLS_ENABLE=0. Matches OPEN bug NVIDIA/nccl#1925 (Cuda
# failure 800 'operation not permitted' on the IMEX path; GB200 there vs GB300 here;
# privileged is the reporter's workaround too).
# KNOWN NOT to work (per #1925): SYS_ADMIN+SYS_RESOURCE+IPC_LOCK+SYS_NICE + seccomp/
# AppArmor Unconfined — the reporter tried that and it still failed. Only untried
# avenues: a fully-configured IMEX domain, or a newer NVIDIA DRA driver.
apiVersion: resource.nvidia.com/v1beta1
kind: ComputeDomain
metadata: {name: nccl-cd, namespace: __NAMESPACE__}
spec:
  numNodes: 2
  channel:
    resourceClaimTemplate:
      name: nccl-cd-channel
---
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata: {name: nccl-mnnvl, namespace: __NAMESPACE__}
spec:
  slotsPerWorker: 1
  runPolicy: {cleanPodPolicy: Running}
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          nodeSelector: {agentpool: system}
          containers:
          - name: nccl
            image: __NCCL_IMAGE__
            command: ["/bin/bash","-c"]
            args:
            - |
              sleep 20
              mpirun -np 2 --allow-run-as-root -bind-to none \
                -x LD_LIBRARY_PATH -x NCCL_DEBUG=INFO -x NCCL_DEBUG_SUBSYS=INIT,NVLS,GRAPH \
                -x NCCL_SOCKET_IFNAME=eth0 -x NCCL_IB_DISABLE=1 \
                -x NCCL_NVLS_ENABLE=1 -x NCCL_MNNVL_ENABLE=1 \
                /opt/nccl_tests/build/all_reduce_perf -b 512M -e 4G -f 2 -g 1 -c 0
    Worker:
      replicas: 2
      template:
        spec:
          runtimeClassName: nvidia
          tolerations:
          - {key: sku, value: gpu, operator: Equal, effect: NoSchedule}
          - {key: nvidia.com/gpu, operator: Exists, effect: NoSchedule}
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector: {matchLabels: {training.kubeflow.org/job-name: nccl-mnnvl, training.kubeflow.org/job-role: worker}}
                topologyKey: kubernetes.io/hostname
          automountServiceAccountToken: false
          resourceClaims:
          - {name: imex-channel, resourceClaimTemplateName: nccl-cd-channel}
          containers:
          - name: nccl
            image: __NCCL_IMAGE__
            securityContext: {privileged: true}
            resources:
              limits:
                nvidia.com/gpu: "1"          # GPU via the device plugin
              claims:
              - {name: imex-channel}          # IMEX channel via DRA ComputeDomains
